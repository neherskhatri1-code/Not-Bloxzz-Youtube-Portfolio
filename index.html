    <style>

        .bg-gaming-dark { background-color: #0f172a; }
        
        .subscribe-sticker {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            transition: transform 0.3s ease;
        }
        .subscribe-sticker:hover { transform: scale(1.1); }
    </style>
</head>
<body class="bg-gaming-dark text-white font-sans">

    <a href="https://www.youtube.com/@NotBloxz1" target="_blank" rel="noopener noreferrer" id="subscribe-sticker" class="subscribe-sticker bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-8 rounded-full shadow-2xl border-4 border-white flex items-center gap-2">

        <div class="space-x-6 hidden md:block">

            <a href="#contact" class="hover:text-red-400 transition">Contact</a>
        </div>
    </nav>

    <header class="py-20 px-6 text-center">
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6">Welcome to the <span class="text-red-500">Bloxzz</span> Universe</h1>

        <a href="mailto:neherskhatri1@gmail.com" class="text-2xl text-blue-400 hover:underline">neherskhatri1@gmail.com</a>

    <footer class="py-10 bg-slate-900 text-center">

    <script>
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    e.preventDefault();
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });
    </script>
